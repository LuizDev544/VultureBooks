<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Livro | BookDonation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/Styles/Editar.css">
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card shadow-lg p-4 form-container" style="max-width: 800px; width: 100%;">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="text-primary m-0">Editar Livro <span th:text="'#' + ${livro.id}" class="text-secondary fs-4"></span></h2>
                <a href="/livros/painel" class="btn btn-outline-secondary btn-sm">Voltar</a>
            </div>
            
            <form th:action="@{/livros/editar/{id}(id=${livro.id})}" method="POST">
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="titulo" class="form-label">Título do Livro</label>
                        <input type="text" class="form-control" id="titulo" name="titulo" th:value="${livro.titulo}" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="statusInicial" class="form-label">Status do Livro</label>
                        <select class="form-select" id="statusInicial" name="statusInicial" required>
                            <option value="DISPONIVEL" th:selected="${livro.status.valor == 'DISPONIVEL'}">Disponível</option>
                            <option value="INDISPONIVEL" th:selected="${livro.status.valor == 'INDISPONIVEL'}">Indisponível</option>
                            <option value="DOADO" th:selected="${livro.status.valor == 'DOADO'}">Doado</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="nomeAutor" class="form-label">Autor</label>
                        <input type="text" class="form-control" id="nomeAutor" name="nomeAutor" th:value="${livro.autor.nome}" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="nomeGenero" class="form-label">Gênero</label>
                        <select class="form-select" id="nomeGenero" name="nomeGenero" required>
                            <option value="Fantasia" th:selected="${livro.genero.nome == 'Fantasia'}">Fantasia</option>
                            <option value="Terror" th:selected="${livro.genero.nome == 'Terror'}">Terror</option>
                            <option value="Romance" th:selected="${livro.genero.nome == 'Romance'}">Romance</option>
                            <option value="Ficcao" th:selected="${livro.genero.nome == 'Ficcao'}">Ficção Científica</option>
                            <option value="Tecnologia" th:selected="${livro.genero.nome == 'Tecnologia'}">Tecnologia</option>
                            <option value="Historia" th:selected="${livro.genero.nome == 'Historia'}">História</option>
                            <option value="Biografia" th:selected="${livro.genero.nome == 'Biografia'}">Biografia</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label for="anoLancamento" class="form-label">Ano de Lançamento</label>
                        <input type="number" class="form-control" id="anoLancamento" name="anoLancamento" th:value="${livro.ano.valor}" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label for="quantidadePaginas" class="form-label">Total de Páginas</label>
                        <input type="number" class="form-control" id="quantidadePaginas" name="quantidadePaginas" th:value="${livro.pagina.quantidade}" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label for="nomeIdioma" class="form-label">Idioma</label>
                        <input type="text" class="form-control" id="nomeIdioma" name="nomeIdioma" th:value="${livro.idioma.nome}" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="textoDescricao" class="form-label">Descrição / Resumo</label>
                    <textarea class="form-control" id="textoDescricao" name="textoDescricao" rows="3" th:text="${livro.descricao.texto}"></textarea>
                </div>

                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-warning btn-lg fw-bold text-dark">Atualizar Livro</button>
                    <a href="/livros/painel" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
