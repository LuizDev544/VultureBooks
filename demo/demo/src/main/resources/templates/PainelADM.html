<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel ADM | Vulture Books</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="/Styles/styles.css">
    <link rel="stylesheet" href="/Styles/LoginADM.css">
</head>
<body>

    <div class="d-flex">
        <nav class="sidebar bg-dark text-white p-3 min-vh-100">
            <h4 class="text-center mb-4 border-bottom pb-3">Vulture Books</h4>
            <ul class="nav flex-column gap-2">
                <li class="nav-item">
                    <a href="/livros/cadastrar" class="nav-link text-white">
                        <i class="bi bi-plus-circle me-2"></i> Cadastrar Livro
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link text-white">
                        <i class="bi bi-pencil-square me-2"></i> Editar Livros
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link text-white text-danger">
                        <i class="bi bi-trash me-2"></i> Excluir Livros
                    </a>
                </li>
            </ul>
            <div class="mt-auto pt-5">
                <a href="/logout" class="btn btn-outline-light btn-sm w-100">Sair</a>
            </div>
        </nav>

        <main class="flex-grow-1 p-4 bg-light">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Gerenciamento de Doação</h2>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-dark">
                                <tr>
                                    <th>ID</th>
                                    <th>Título</th>
                                    <th>Descrição</th>
                                    <th>Autor</th>
                                    <th>Gênero</th>
                                    <th>Páginas</th>
                                    <th>Idioma</th>
                                    <th>Ano Livro</th>
                                    <th>Condição</th>
                                    <th class="text-center">Ações</th>
                                </tr>
                            </thead>
                            
                            <tbody>
                                <tr th:each="livro : ${livros}">
                                    <td th:text="${livro.id}"></td>
                                    
                                    <td><strong th:text="${livro.titulo}"></strong></td>
                                    
                                    <td th:text="${livro.descricao.texto}"></td>
                                    <td th:text="${livro.autor.nome}"></td>
                                    <td th:text="${livro.genero.nome}"></td>
                                    <td th:text="${livro.pagina.quantidade}"></td> <td th:text="${livro.idioma.nome}"></td>
                                    <td th:text="${livro.ano.valor}"></td> <td>
                                        <span th:if="${livro.status.valor == 'DISPONIVEL'}" class="badge bg-success">Disponível</span>
                                        <span th:if="${livro.status.valor == 'INDISPONIVEL'}" class="badge bg-secondary">Indisponível</span>
                                        <span th:if="${livro.status.valor == 'DOADO'}" class="badge bg-primary">Doado</span>
                                    </td>
                                    
                                    <td class="text-center">
                                        <button class="btn btn-sm btn-warning"><i class="bi bi-pencil"></i></button>
                                        <button class="btn btn-sm btn-danger"><i class="bi bi-trash"></i></button>
                                    </td>
                                </tr>
                                
                                <tr th:if="${#lists.isEmpty(livros)}">
                                    <td colspan="9" class="text-center text-muted py-4">
                                        Nenhum livro cadastrado ainda. Clique em "Cadastrar Livro" para começar!
                                    </td>
                                </tr>
                            </tbody>

                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
