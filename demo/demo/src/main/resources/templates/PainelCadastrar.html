<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Livro | BookDonation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/Styles/styles.css">
    <link rel="stylesheet" href="../static/Styles/Cadastrar.css">
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card shadow-lg p-4 form-container" style="max-width: 800px; width: 100%;">
            <h2 class="text-center mb-4 text-primary">Cadastrar Novo Livro</h2>
            
            <form action="/livros/cadastrar" method="POST">
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="titulo" class="form-label">Título do Livro</label>
                        <input type="text" class="form-control" id="titulo" name="titulo" placeholder="Ex: O Senhor dos Anéis" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="statusInicial" class="form-label">Status do Livro</label>
                        <select class="form-select" id="statusInicial" name="statusInicial" required>
                            <option selected disabled>Selecione o estado atual</option>
                            <option value="DISPONIVEL">Disponível</option>
                            <option value="INDISPONIVEL">Indisponível</option>
                            <option value="DOADO">Doado</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="nomeAutor" class="form-label">Autor</label>
                        <input type="text" class="form-control" id="nomeAutor" name="nomeAutor" required placeholder="Ex: J.R.R. Tolkien">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="nomeGenero" class="form-label">Gênero</label>
                        <select class="form-select" id="nomeGenero" name="nomeGenero" required>
                            <option selected disabled>Escolha o gênero...</option>
                            <option value="Fantasia">Fantasia</option>
                            <option value="Terror">Terror</option>
                            <option value="Romance">Romance</option>
                            <option value="Ficcao">Ficção Científica</option>
                            <option value="Tecnologia">Tecnologia</option>
                            <option value="Historia">História</option>
                            <option value="Biografia">Biografia</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label for="anoLancamento" class="form-label">Ano de Lançamento</label>
                        <input type="number" class="form-control" id="anoLancamento" name="anoLancamento" placeholder="Ex: 1954" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label for="quantidadePaginas" class="form-label">Total de Páginas</label>
                        <input type="number" class="form-control" id="quantidadePaginas" name="quantidadePaginas" placeholder="Ex: 1200" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label for="nomeIdioma" class="form-label">Idioma</label>
                        <input type="text" class="form-control" id="nomeIdioma" name="nomeIdioma" placeholder="Ex: Português" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="textoDescricao" class="form-label">Descrição / Resumo</label>
                    <textarea class="form-control" id="textoDescricao" name="textoDescricao" rows="3" placeholder="Conte um pouco sobre a obra..."></textarea>
                </div>

                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-primary btn-lg">Salvar Doação</button>
                    <a href="/livros/painel" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
